apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: event-driven-python
  displayName: Event Driven Worker
  description: Python async worker scaffold for event processing.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Python
  patternKind: event-driven
  files:
  - path: agents/{{ .AgentName }}/consumer.py
    template: consumer.py.tmpl
    description: Async consumer
  - path: agents/{{ .AgentName }}/handler.py
    template: handler.py.tmpl
    description: Handler
  - path: agents/{{ .AgentName }}/event.py
    template: event.py.tmpl
    description: Event model
  - path: agents/{{ .AgentName }}/publisher.py
    template: publisher.py.tmpl
    description: Publisher helper
  promptHints:
    skeleton: Consumer coroutine passes event to handler.
    implementation: Process one event type cleanly and publish follow-up work.
    tanks: Persist checkpoints or offsets separately.
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 10
    compositesWith:
    - hexagonal-python
    tags:
    - events
    - consumer
    - async
  contextMapping:
    appliesWhen:
      requirements:
      - Python
      - event-driven
      - asynchronous processing
      scale:
        workload: consumer-or-worker
    doesNotApplyWhen:
    - crud-only
    - rest-only
    - graphql-only
    - sync-request-response
  triggerIncidents:
    exactMatches:
    - Python::event-driven[*]
    - Python::worker[*] + Messaging[*]
    semanticTriggers:
      keywords:
        required:
        - python
        - event
        optional:
        - consumer
        - async
        - worker
        - publisher
        - messaging
      antiKeywords:
      - crud-only
      - rest-only
      - graphql-only
      - sync-request-response
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
