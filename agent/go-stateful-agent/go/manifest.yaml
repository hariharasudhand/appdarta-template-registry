apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: go-stateful-agent
  displayName: Go Stateful Agent
  description: Go HTTP agent with checkpoint-aware state and DHIL-RT policy.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Go
  patternKind: go-stateful-agent
  dhil_dt_routing:
    preferred_tier: l2
    required_skills:
    - coder
    - go-coder
    role: implementation/complex
  files:
  - path: agents/{{ .AgentName }}/agent.go
    template: agent.go.tmpl
    description: Stateful agent HTTP server
  - path: agents/{{ .AgentName }}/state.go
    template: state.go.tmpl
    description: State serialization
  - path: agents/{{ .AgentName }}/appdarta-policy.yaml
    template: appdarta-policy.yaml.tmpl
    description: Gateway pipeline policy
  - path: agents/{{ .AgentName }}/agent-spec.yaml
    template: agent-spec.yaml.tmpl
    description: AppDarta agent spec
  gateway_policy:
    handlers:
    - auth_enforcement
    - stateful-agent-invoke
    - audit_logger
  intelligence:
    maturityLevel: beta
    complexityFloor: 4
    complexityIdeal: 8
    complexityCeiling: 18
    tags:
    - go
    - stateful
    - checkpoint
    - agent
templatesApiVersion: '1'
