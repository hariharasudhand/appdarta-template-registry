apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: hexagonal-go
  displayName: Hexagonal Architecture
  description: Ports and adapters agent scaffold for Go.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Go
  patternKind: hexagonal
  files:
  - path: agents/{{ .AgentName }}/handler/handler.go
    template: handler.go.tmpl
    description: Entry point handler
  - path: agents/{{ .AgentName }}/domain/domain.go
    template: domain.go.tmpl
    description: Core business logic
  - path: agents/{{ .AgentName }}/ports/in/port.go
    template: port_in.go.tmpl
    description: Inbound service contract
  - path: agents/{{ .AgentName }}/ports/out/adapter.go
    template: port_out.go.tmpl
    description: Outbound repository contracts
  - path: agents/{{ .AgentName }}/dto/dto.go
    template: dto.go.tmpl
    description: Request and response DTOs
  promptHints:
    skeleton: Handler delegates into domain service through inbound ports.
    implementation: Keep business logic in domain and infrastructure behind ports/out.
    tanks: Inject tank adapters behind outbound ports.
  intelligence:
    maturityLevel: stable
    complexityFloor: 3
    complexityIdeal: 6
    complexityCeiling: 20
    compositesWith:
    - go-crud-api
    - rag-agent-go
    - event-driven-go
    tags:
    - hexagonal
    - ports-adapters
    - enterprise
  contextMapping:
    appliesWhen:
      requirements:
      - Go
      - hexagonal
      - ports-and-adapters
      scale:
        architecture: layered-domain-with-adapters
    doesNotApplyWhen:
    - simple-service
    - crud-only
    - event-driven-only
    - single-file prototype
  triggerIncidents:
    exactMatches:
    - Go::hexagonal[*]
    - "Go::REST[*] \u2192 Architecture[Hexagonal]"
    semanticTriggers:
      keywords:
        required:
        - go
        - hexagonal
        optional:
        - ports
        - adapters
        - domain
        - repository
        - dto
      antiKeywords:
      - simple-service
      - crud-only
      - event-driven-only
      - single-file
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
