apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: hexagonal-java
  displayName: Hexagonal Spring
  description: Java hexagonal scaffold for Spring-style services.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Java
  - Spring Boot
  patternKind: hexagonal
  files:
  - path: agents/{{ .AgentName }}/{{ pascal .AgentName }}Controller.java
    template: Controller.java.tmpl
    description: Spring controller
  - path: agents/{{ .AgentName }}/{{ pascal .AgentName }}Service.java
    template: Service.java.tmpl
    description: Service class
  - path: agents/{{ .AgentName }}/{{ pascal .AgentName }}Port.java
    template: Port.java.tmpl
    description: Port contract
  - path: agents/{{ .AgentName }}/{{ pascal .AgentName }}Dto.java
    template: Dto.java.tmpl
    description: DTOs
  promptHints:
    skeleton: Controller hands off to service and port abstractions.
    implementation: Keep transport concerns out of service implementation.
    tanks: Inject repositories through interfaces.
  intelligence:
    maturityLevel: beta
    complexityFloor: 3
    complexityIdeal: 6
    complexityCeiling: 16
    compositesWith: []
    tags:
    - java
    - spring
    - hexagonal
templatesApiVersion: '1'
