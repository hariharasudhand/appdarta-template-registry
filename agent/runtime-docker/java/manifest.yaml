apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: agent-runtime-docker-java
  displayName: Agent Runtime Overlay (Docker, Java)
  description: 'Build-time runtime overlay for Java agents: Dockerfile and docker-compose
    service.'
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Java
  - Spring Boot
  patternKind: runtime-docker
  files:
  - path: agents/{{ .AgentName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Java agent Dockerfile
  - path: agents/{{ .AgentName }}/docker-compose.yml
    template: docker-compose.yml.tmpl
    description: Java agent compose service
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 4
    tags:
    - overlay
    - docker
    - runtime
    - java
templatesApiVersion: '1'
