apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: saga-go
  displayName: Saga Coordinator
  description: Go saga coordinator for distributed step orchestration.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Go
  patternKind: saga
  files:
  - path: agents/{{ .AgentName }}/coordinator.go
    template: coordinator.go.tmpl
    description: Saga coordinator
  - path: agents/{{ .AgentName }}/steps.go
    template: steps.go.tmpl
    description: Step contracts
  - path: agents/{{ .AgentName }}/dto.go
    template: dto.go.tmpl
    description: Saga DTOs
  promptHints:
    skeleton: Coordinator runs ordered steps with compensations.
    implementation: Model compensating actions for each step.
    tanks: Persist saga state externally.
  intelligence:
    maturityLevel: beta
    complexityFloor: 5
    complexityIdeal: 8
    complexityCeiling: 18
    compositesWith:
    - event-driven-go
    tags:
    - saga
    - workflow
    - coordination
templatesApiVersion: '1'
