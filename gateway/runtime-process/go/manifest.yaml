apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: gateway-runtime-process
  displayName: Gateway Runtime Overlay (Process)
  description: Build-time runtime overlay for local gateway execution.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: gateway
  techStacks:
  - Go
  patternKind: runtime-process
  files:
  - path: gateway/run-local.sh
    template: run-local.sh.tmpl
    description: Gateway local process launcher
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 1
    complexityCeiling: 3
    tags:
    - overlay
    - process
    - runtime
    - gateway
templatesApiVersion: '1'
