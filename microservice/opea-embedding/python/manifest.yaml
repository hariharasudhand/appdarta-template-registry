apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: opea-embedding-tei-python
  displayName: OPEA Embedding Service (Python/TEI)
  description: OPEA-compliant embedding service scaffold. FastAPI, TEI backend, OpenAI
    /v1/embeddings API.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: microservice
  techStacks:
  - Python
  patternKind: opea-embedding
  opea:
    patternRef: embedding-service
    language: Python
    backend: TEI
    complianceLevel: L1
  files:
  - path: microservices/{{ .ServiceName }}/service.py
    template: service.py.tmpl
    description: Embedding service entry point
  - path: microservices/{{ .ServiceName }}/requirements.txt
    template: requirements.txt.tmpl
    description: Python dependencies
  - path: microservices/{{ .ServiceName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Container definition
  - path: microservices/{{ .ServiceName }}/docker-compose.yml
    template: docker-compose.yml.tmpl
    description: Local dev compose
  - path: microservices/{{ .ServiceName }}/.env.example
    template: .env.example.tmpl
    description: Environment variable documentation
  promptHints:
    skeleton: FastAPI service exposing /v1/embeddings and /v1/health_check.
    implementation: Forward text batches to TEI backend, return OpenAI-compatible
      embedding response.
    tanks: "No tank dependency \u2014 stateless service."
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 5
    compositesWith:
    - opea-retriever-redis-go
    - vector-pgvector-python
    tags:
    - opea
    - embedding
    - tei
    - enterprise-ai
templatesApiVersion: '1'
