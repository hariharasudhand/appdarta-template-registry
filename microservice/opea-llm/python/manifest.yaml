apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: opea-llm-vllm-python
  displayName: OPEA LLM Service (Python/vLLM)
  description: OPEA-compliant LLM inference service scaffold. FastAPI, vLLM backend,
    OpenAI /v1/chat/completions with streaming.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: microservice
  techStacks:
  - Python
  patternKind: opea-llm
  opea:
    patternRef: llm-service
    language: Python
    backend: vLLM
    complianceLevel: L1
  files:
  - path: microservices/{{ .ServiceName }}/service.py
    template: service.py.tmpl
    description: LLM service entry point
  - path: microservices/{{ .ServiceName }}/requirements.txt
    template: requirements.txt.tmpl
    description: Python dependencies
  - path: microservices/{{ .ServiceName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Container definition
  - path: microservices/{{ .ServiceName }}/docker-compose.yml
    template: docker-compose.yml.tmpl
    description: Local dev compose
  - path: microservices/{{ .ServiceName }}/.env.example
    template: .env.example.tmpl
    description: Environment variable documentation
  promptHints:
    skeleton: FastAPI service exposing /v1/chat/completions and /v1/health_check with
      SSE streaming.
    implementation: Proxy chat messages to vLLM backend; forward streaming chunks
      as server-sent events.
    tanks: "No tank dependency \u2014 stateless inference proxy."
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 3
    complexityCeiling: 7
    compositesWith:
    - opea-embedding-tei-python
    - opea-retriever-redis-go
    tags:
    - opea
    - llm
    - vllm
    - enterprise-ai
    - streaming
templatesApiVersion: '1'
