apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: opea-retriever-redis-go
  displayName: OPEA Retriever Service (Go/Redis)
  description: OPEA-compliant retrieval service in Go. Redis vector search backend.
    Proves any-language OPEA compliance.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: microservice
  techStacks:
  - Go
  patternKind: opea-retrieval
  opea:
    patternRef: retriever-service
    language: Go
    backend: Redis
    complianceLevel: L1
  files:
  - path: microservices/{{ .ServiceName }}/main.go
    template: main.go.tmpl
    description: Entry point
  - path: microservices/{{ .ServiceName }}/handler.go
    template: handler.go.tmpl
    description: HTTP handler
  - path: microservices/{{ .ServiceName }}/retriever.go
    template: retriever.go.tmpl
    description: Redis retrieval logic
  - path: microservices/{{ .ServiceName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Container definition
  - path: microservices/{{ .ServiceName }}/docker-compose.yml
    template: docker-compose.yml.tmpl
    description: Local dev compose
  - path: microservices/{{ .ServiceName }}/.env.example
    template: .env.example.tmpl
    description: Environment variable documentation
  promptHints:
    skeleton: Go net/http server with /v1/retrieval POST and /v1/health_check GET.
    implementation: Search Redis vector index using query embedding; return top-k
      documents.
    tanks: Depends on Redis with vector search (RediSearch/VSS module).
  intelligence:
    maturityLevel: beta
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 8
    compositesWith:
    - opea-embedding-tei-python
    - nosql-redis-go
    tags:
    - opea
    - retrieval
    - redis
    - go
    - enterprise-ai
templatesApiVersion: '1'
