apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: write-back-handler
  displayName: Write-back handler (runtime)
  description: "Standalone runtime module executing TankConnectorConfig.write-back\
    \ operations. Wires approval-gate trigger to POST /callbacks/approval completion.\
    \ P8.1 deliverable \u2014 Industry_readiness_plan Phase 5.\n"
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: runtime
  techStacks:
  - Go
  patternKind: write-back-handler
  files:
  - path: runtime/writeback/handler.go
    template: handler.go.tmpl
  - path: runtime/writeback/README.md
    template: README.md.tmpl
  promptHints:
    skeleton: 'Load connector write-back ops; dispatch HTTP on approval-gate when
      decision=approved. Resolve contract-ref against FunctionalModel.contracts from
      Design signoff.

      '
    implementation: 'Use shared retry config from connector. Audit to .darta/write-back-audit.jsonl.
      CLI API: POST /api/runtime/write-back/dispatch for manual/integration tests.

      '
    tanks: Pair with ingestor-api-go pull sidecar; write-back is outbound only.
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 8
    compositesWith:
    - ingestor-api-go
    tags:
    - write-back
    - erp
    - approval-gate
    - runtime
  integrationClasses:
  - erp-rest
  defaultWhen:
    operations_write_non_empty: true
templatesApiVersion: '1'
