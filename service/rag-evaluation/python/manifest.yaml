apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: rag-evaluation-harness-python
  displayName: RAG Evaluation Harness (Python)
  description: RAGAS metrics runner with faithfulness, context_precision, and answer_relevancy.
    Langfuse trace integration for per-run observability. Evaluation report generator.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: service
  techStacks:
  - Python
  patternKind: rag-evaluation
  files:
  - path: services/{{ .ServiceName }}/evaluator.py
    template: evaluator.py.tmpl
    description: RAGAS metrics runner
  - path: services/{{ .ServiceName }}/tracer.py
    template: tracer.py.tmpl
    description: Langfuse trace integration
  - path: services/{{ .ServiceName }}/report.py
    template: report.py.tmpl
    description: Evaluation report generator
  - path: services/{{ .ServiceName }}/requirements.txt
    template: requirements.txt.tmpl
    description: Python dependencies
  promptHints:
    skeleton: 'RAGAS eval pipeline: faithfulness + context_precision + answer_relevancy,
      Langfuse tracing.'
    implementation: Wire evaluator.evaluate() to your RAG pipeline output.
  intelligence:
    maturityLevel: beta
    complexityFloor: 3
    complexityIdeal: 5
    complexityCeiling: 8
    tags:
    - ragas
    - evaluation
    - langfuse
    - rag
    - python
    - observability
templatesApiVersion: '1'
