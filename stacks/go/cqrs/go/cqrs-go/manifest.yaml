apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: cqrs-go
  displayName: CQRS
  description: Go scaffold splitting command and query flows.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Go
  patternKind: cqrs
  files:
  - path: agents/{{ .AgentName }}/command_handler.go
    template: command_handler.go.tmpl
    description: Command path
  - path: agents/{{ .AgentName }}/query_handler.go
    template: query_handler.go.tmpl
    description: Query path
  - path: agents/{{ .AgentName }}/model.go
    template: model.go.tmpl
    description: Command and query models
  - path: agents/{{ .AgentName }}/dto.go
    template: dto.go.tmpl
    description: Shared DTOs
  promptHints:
    skeleton: Separate command writes from query reads.
    implementation: Keep read models isolated from command handling.
    tanks: Split write and read storage if needed.
  intelligence:
    maturityLevel: beta
    complexityFloor: 4
    complexityIdeal: 7
    complexityCeiling: 14
    compositesWith:
    - event-driven-go
    tags:
    - cqrs
    - commands
    - queries
templatesApiVersion: '1'
