apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: mcp-server-go
  displayName: MCP Server (Go)
  description: Model Context Protocol server in Go. Tools, Resources handlers with
    JSON-RPC 2.0 transport over stdio or HTTP.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: service
  techStacks:
  - Go
  patternKind: mcp-server
  files:
  - path: services/{{ .ServiceName }}/main.go
    template: main.go.tmpl
    description: MCP server entry point
  - path: services/{{ .ServiceName }}/tools.go
    template: tools.go.tmpl
    description: Tool handlers
  - path: services/{{ .ServiceName }}/resources.go
    template: resources.go.tmpl
    description: Resource handlers
  - path: services/{{ .ServiceName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Container definition
  promptHints:
    skeleton: MCP server with JSON-RPC 2.0, stdio transport, capability registry in
      Go.
    implementation: Add tool handlers in tools.go, expose resources in resources.go.
  intelligence:
    maturityLevel: beta
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 9
    tags:
    - mcp
    - protocol
    - go
    - llm-integration
    - tool-use
  contextMapping:
    appliesWhen:
      requirements:
      - Go
      - MCP
      - tool or resource protocol service
      scale:
        interface: json-rpc server for model integrations
    doesNotApplyWhen:
    - rest-only api
    - frontend-only
    - event-driven-only
    - graphql gateway
  triggerIncidents:
    exactMatches:
    - Go::mcp-server[*]
    - Go::service[*] + Protocol[MCP]
    semanticTriggers:
      keywords:
        required:
        - go
        - mcp
        optional:
        - protocol
        - tool
        - resource
        - json-rpc
        - server
      antiKeywords:
      - rest-only
      - frontend-only
      - event-driven-only
      - graphql
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
