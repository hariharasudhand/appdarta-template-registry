apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: nosql-mongo-go
  displayName: Mongo Connector
  description: Go MongoDB connector scaffold.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Go
  patternKind: nosql-mongo
  files:
  - path: tanks/{{ .TankName }}/connector.go
    template: connector.go.tmpl
    description: Mongo connector
  - path: tanks/{{ .TankName }}/model.go
    template: model.go.tmpl
    description: Mongo document
  promptHints:
    skeleton: Collection wrapper and document type.
    implementation: Add repository methods around collection operations.
    tanks: Good fit for flexible document payloads.
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 10
    compositesWith: []
    tags:
    - mongo
    - nosql
    - document
  contextMapping:
    appliesWhen:
      requirements:
      - Go
      - MongoDB
      - document storage
      scale:
        storage: schema-flexible documents
    doesNotApplyWhen:
    - PostgreSQL
    - Redis
    - vector database
    - strict relational joins
  triggerIncidents:
    exactMatches:
    - Go::nosql-mongo[*]
    - Go::connector[*] + DB[MongoDB]
    semanticTriggers:
      keywords:
        required:
        - go
        - mongodb
        optional:
        - mongo
        - nosql
        - document
        - collection
        - connector
      antiKeywords:
      - postgres
      - redis
      - vector
      - joins
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
