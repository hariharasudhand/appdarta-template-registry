apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: agent-runtime-docker-go
  displayName: Agent Runtime Overlay (Docker, Go)
  description: 'Build-time runtime overlay for Go agents: Dockerfile and docker-compose
    service.'
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Go
  patternKind: runtime-docker
  files:
  - path: agents/{{ .AgentName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Go agent Dockerfile
  - path: agents/{{ .AgentName }}/docker-compose.yml
    template: docker-compose.yml.tmpl
    description: Go agent compose service
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 4
    tags:
    - overlay
    - docker
    - runtime
    - go
templatesApiVersion: '1'
