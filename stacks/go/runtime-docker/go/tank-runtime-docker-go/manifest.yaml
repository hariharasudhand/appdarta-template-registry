apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: tank-runtime-docker-go
  displayName: Tank Runtime Overlay (Docker, Go)
  description: 'Build-time runtime overlay for Go tanks: Dockerfile and docker-compose
    service.'
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Go
  patternKind: runtime-docker
  files:
  - path: tanks/{{ .TankName }}/Dockerfile
    template: Dockerfile.tmpl
    description: Go tank Dockerfile
  - path: tanks/{{ .TankName }}/docker-compose.yml
    template: docker-compose.yml.tmpl
    description: Go tank compose service
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 4
    tags:
    - overlay
    - docker
    - runtime
    - tank
templatesApiVersion: '1'
