apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: simple-service-go
  displayName: Simple Service
  description: Thin Go handler and service for straightforward workflows.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Go
  patternKind: simple-service
  files:
  - path: agents/{{ .AgentName }}/handler.go
    template: handler.go.tmpl
    description: HTTP entrypoint
  - path: agents/{{ .AgentName }}/service.go
    template: service.go.tmpl
    description: Minimal service layer
  - path: agents/{{ .AgentName }}/dto.go
    template: dto.go.tmpl
    description: Request and response models
  promptHints:
    skeleton: Direct handler to service path with minimal layers.
    implementation: Use for low-complexity endpoints with small domain logic.
    tanks: Inject a single tank directly if needed.
  intelligence:
    maturityLevel: stable
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 4
    compositesWith:
    - go-crud-api
    tags:
    - simple
    - service
    - quick-start
  contextMapping:
    appliesWhen:
      requirements:
      - Go
      - service
      - simple
      scale:
        complexity: low-to-moderate
    doesNotApplyWhen:
    - event-driven
    - cqrs
    - saga
    - hexagonal
  triggerIncidents:
    exactMatches:
    - Go::simple-service[*]
    semanticTriggers:
      keywords:
        required:
        - go
        - service
        optional:
        - simple
        - handler
        - dto
        - api
      antiKeywords:
      - event-driven
      - cqrs
      - saga
      - hexagonal
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
