apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: sql-sqlite-go
  displayName: SQLite Connector
  description: Embedded SQLite connector scaffold for lightweight local tanks.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Go
  patternKind: sql-sqlite
  files:
  - path: tanks/{{ .TankName }}/connector.go
    template: connector.go.tmpl
    description: SQL connector
  - path: tanks/{{ .TankName }}/queries.go
    template: queries.go.tmpl
    description: Write queries
  - path: tanks/{{ .TankName }}/schema.sql
    template: schema.sql.tmpl
    description: Schema bootstrap
  promptHints:
    skeleton: Single embedded connector with local schema.
    implementation: Use for local-first or single-node storage.
    tanks: Avoid network dependency for demos and tests.
  intelligence:
    maturityLevel: stable
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 6
    compositesWith: []
    tags:
    - sql
    - sqlite
    - embedded
templatesApiVersion: '1'
