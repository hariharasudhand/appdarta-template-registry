apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: crewai-crew
  displayName: CrewAI Crew
  description: CrewAI crew with LiteLLM-backed agents and DHIL-RT gateway policy.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Python
  patternKind: crewai-crew
  dhil_dt_routing:
    preferred_tier: l2
    required_skills:
    - coder
    - python
    role: implementation/complex
  files:
  - path: agents/{{ .AgentName }}/crew.py
    template: crew.py.tmpl
    description: CrewAI crew service
  - path: agents/{{ .AgentName }}/appdarta-policy.yaml
    template: appdarta-policy.yaml.tmpl
    description: Gateway pipeline policy
  - path: agents/{{ .AgentName }}/agent-spec.yaml
    template: agent-spec.yaml.tmpl
    description: AppDarta agent spec
  promptHints:
    skeleton: CrewAI researcher and writer agents using LiteLLM-backed LLMs.
    implementation: Expose kickoff endpoint and keep provider selection behind DHIL-RT.
  gateway_policy:
    handlers:
    - auth_enforcement
    - budget_enforce
    - crewai-kickoff
    - audit_logger
  intelligence:
    maturityLevel: beta
    complexityFloor: 4
    complexityIdeal: 8
    complexityCeiling: 18
    tags:
    - crewai
    - crew
    - multi-agent
    - python
templatesApiVersion: '1'
