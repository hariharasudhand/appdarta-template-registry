apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: hexagonal-python
  displayName: Hexagonal FastAPI
  description: Hexagonal Python scaffold with FastAPI entrypoint.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Python
  patternKind: hexagonal
  files:
  - path: agents/{{ .AgentName }}/handler.py
    template: handler.py.tmpl
    description: FastAPI entrypoint
  - path: agents/{{ .AgentName }}/service.py
    template: service.py.tmpl
    description: Domain service
  - path: agents/{{ .AgentName }}/ports.py
    template: ports.py.tmpl
    description: Port definitions
  - path: agents/{{ .AgentName }}/dto.py
    template: dto.py.tmpl
    description: Pydantic DTOs
  promptHints:
    skeleton: Router calls service via clean DTOs.
    implementation: Keep I/O in handler and domain logic in service.
    tanks: Hide tank integrations behind protocols.
  intelligence:
    maturityLevel: stable
    complexityFloor: 3
    complexityIdeal: 6
    complexityCeiling: 18
    compositesWith:
    - rag-agent-python
    - event-driven-python
    tags:
    - hexagonal
    - fastapi
    - enterprise
  contextMapping:
    appliesWhen:
      requirements:
      - Python
      - hexagonal
      - FastAPI
      scale:
        architecture: service-with-ports
    doesNotApplyWhen:
    - event-driven-only
    - vue
    - next.js
    - single-script
  triggerIncidents:
    exactMatches:
    - Python::hexagonal[*]
    - "Python::API[*] + Framework[FastAPI] \u2192 Architecture[Hexagonal]"
    semanticTriggers:
      keywords:
        required:
        - python
        - hexagonal
        optional:
        - fastapi
        - ports
        - service
        - dto
        - protocols
      antiKeywords:
      - event-driven-only
      - vue
      - next.js
      - single-script
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
