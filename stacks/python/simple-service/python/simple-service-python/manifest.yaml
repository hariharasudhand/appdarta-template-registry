apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: simple-service-python
  displayName: Simple Service
  description: Minimal FastAPI service for low-complexity flows.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: agent
  techStacks:
  - Python
  patternKind: simple-service
  files:
  - path: agents/{{ .AgentName }}/app.py
    template: app.py.tmpl
    description: FastAPI route
  - path: agents/{{ .AgentName }}/service.py
    template: service.py.tmpl
    description: Simple service implementation
  - path: agents/{{ .AgentName }}/dto.py
    template: dto.py.tmpl
    description: Pydantic models
  promptHints:
    skeleton: One route, one service, one DTO pair.
    implementation: Keep latency and wiring minimal.
    tanks: Inline a single backend call if needed.
  intelligence:
    maturityLevel: stable
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 4
    compositesWith: []
    tags:
    - simple
    - fastapi
    - quick-start
  contextMapping:
    appliesWhen:
      requirements:
      - Python
      - service
      - simple
      scale:
        complexity: low-to-moderate
    doesNotApplyWhen:
    - event-driven
    - cqrs
    - saga
    - hexagonal
  triggerIncidents:
    exactMatches:
    - Python::simple-service[*]
    - Python::API[*] + Framework[FastAPI]
    semanticTriggers:
      keywords:
        required:
        - python
        - service
        optional:
        - simple
        - fastapi
        - handler
        - dto
        - api
      antiKeywords:
      - event-driven
      - cqrs
      - saga
      - hexagonal
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
