apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: vector-chroma-python
  displayName: Chroma Store
  description: Python Chroma vector collection scaffold.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Python
  patternKind: vector-chroma
  files:
  - path: tanks/{{ .TankName }}/connector.py
    template: connector.py.tmpl
    description: Chroma connector
  - path: tanks/{{ .TankName }}/embed.py
    template: embed.py.tmpl
    description: Embedding config
  - path: tanks/{{ .TankName }}/collection.py
    template: collection.py.tmpl
    description: Collection accessor
  promptHints:
    skeleton: Initialize Chroma client and collection naming.
    implementation: Use for local or fast-moving retrieval prototypes.
    tanks: Keep collection config explicit.
  intelligence:
    maturityLevel: beta
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 10
    compositesWith:
    - rag-agent-python
    tags:
    - vector
    - chroma
    - retrieval
  contextMapping:
    appliesWhen:
      requirements:
      - Python
      - Chroma
      - vector retrieval
      scale:
        storage: prototype-or-local embedding store
    doesNotApplyWhen:
    - PostgreSQL
    - Redis
    - strict relational storage
    - no similarity search
  triggerIncidents:
    exactMatches:
    - Python::vector-chroma[*]
    - Python::connector[*] + DB[Chroma]
    semanticTriggers:
      keywords:
        required:
        - python
        - chroma
        optional:
        - vector
        - embedding
        - retrieval
        - collection
        - similarity
      antiKeywords:
      - postgres
      - redis
      - relational
      - no similarity search
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
