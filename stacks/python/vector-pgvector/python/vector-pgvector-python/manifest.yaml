apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: vector-pgvector-python
  displayName: pgvector Store
  description: Python vector store scaffold on Postgres pgvector.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Python
  patternKind: vector-pgvector
  files:
  - path: tanks/{{ .TankName }}/connector.py
    template: connector.py.tmpl
    description: pgvector connector
  - path: tanks/{{ .TankName }}/embed.py
    template: embed.py.tmpl
    description: Embedding settings
  - path: tanks/{{ .TankName }}/schema.sql
    template: schema.sql.tmpl
    description: Vector schema
  promptHints:
    skeleton: Track embedding settings alongside storage.
    implementation: Build retrieval wrappers around the store class.
    tanks: Good match for Python retrieval services.
  intelligence:
    maturityLevel: beta
    complexityFloor: 3
    complexityIdeal: 6
    complexityCeiling: 14
    compositesWith:
    - rag-agent-python
    tags:
    - vector
    - pgvector
    - retrieval
templatesApiVersion: '1'
