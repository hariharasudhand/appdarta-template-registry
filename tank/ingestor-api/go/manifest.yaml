apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: ingestor-api-go
  displayName: API Ingestor
  description: Go ingestor scaffold for polling upstream REST APIs into tanks.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Go
  patternKind: ingestor-api
  files:
  - path: tanks/{{ .TankName }}/connector.go
    template: connector.go.tmpl
    description: Ingestor entrypoint
  - path: tanks/{{ .TankName }}/client.go
    template: client.go.tmpl
    description: API client
  - path: tanks/{{ .TankName }}/transform.go
    template: transform.go.tmpl
    description: Transform helpers
  - path: tanks/{{ .TankName }}/schedule.go
    template: schedule.go.tmpl
    description: Schedule settings
  promptHints:
    skeleton: Client fetches upstream payload, transform normalizes, connector persists.
    implementation: Keep scheduling and backoff separate from transformation.
    tanks: Use for deterministic scheduled imports.
    writeBack: When operations.write[] or connector-config.write-back.operations[]
      is non-empty, add the runtime/write-back-handler CodeTemplate and route approval-gate
      writes through POST /api/runtime/write-back/dispatch; preserve contract-ref
      values for FunctionalModel validation.
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 5
    complexityCeiling: 12
    compositesWith:
    - sql-postgres-go
    - write-back-handler
    tags:
    - ingestor
    - api
    - polling
templatesApiVersion: '1'
