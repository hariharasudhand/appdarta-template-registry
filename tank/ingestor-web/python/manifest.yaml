apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: ingestor-web-python
  displayName: Web Ingestor
  description: Python crawler scaffold for scraping or ingesting web sources.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Python
  patternKind: ingestor-web
  files:
  - path: tanks/{{ .TankName }}/crawler.py
    template: crawler.py.tmpl
    description: Crawler
  - path: tanks/{{ .TankName }}/parser.py
    template: parser.py.tmpl
    description: Parser
  - path: tanks/{{ .TankName }}/transform.py
    template: transform.py.tmpl
    description: Transform
  - path: tanks/{{ .TankName }}/schedule.py
    template: schedule.py.tmpl
    description: Schedule
  promptHints:
    skeleton: Crawler fetches HTML, parser extracts structure, transform normalizes.
    implementation: Keep crawl and parse concerns separate.
    tanks: Best fit for content ingestion from web sources.
  intelligence:
    maturityLevel: beta
    complexityFloor: 2
    complexityIdeal: 5
    complexityCeiling: 12
    compositesWith:
    - sql-postgres-python
    tags:
    - ingestor
    - web
    - crawler
templatesApiVersion: '1'
