apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: sql-postgres-go
  displayName: Postgres SQL Connector
  description: Go SQL connector scaffold for Postgres-backed tanks.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: tank
  techStacks:
  - Go
  patternKind: sql-postgres
  files:
  - path: tanks/{{ .TankName }}/connector.go
    template: connector.go.tmpl
    description: Postgres connector
  - path: tanks/{{ .TankName }}/queries.go
    template: queries.go.tmpl
    description: Query helpers
  - path: tanks/{{ .TankName }}/migrations/001_init.sql
    template: 001_init.sql.tmpl
    description: Initial migration
  promptHints:
    skeleton: Connector opens db and exposes query helpers.
    implementation: Add domain-specific queries on top of base connector.
    tanks: Use Postgres for relational and JSON workloads.
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 5
    complexityCeiling: 12
    compositesWith:
    - ingestor-api-go
    tags:
    - sql
    - postgres
    - connector
  contextMapping:
    appliesWhen:
      requirements:
      - Go
      - PostgreSQL
      - SQL
      scale:
        storage: relational-or-json
    doesNotApplyWhen:
    - MongoDB
    - Redis
    - vector
  triggerIncidents:
    exactMatches:
    - Go::sql-postgres[*]
    - Go::connector[*] + DB[PostgreSQL]
    semanticTriggers:
      keywords:
        required:
        - go
        - postgres
        optional:
        - sql
        - migration
        - connector
        - queries
      antiKeywords:
      - mongodb
      - redis
      - vector
      - chroma
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
